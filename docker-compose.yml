version: '3.8'

services:
  # Database: MongoDB
  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    container_name: agroguide-mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: agroguide
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache & Queue: Redis
  redis:
    build:
      context: ./redis
      dockerfile: Dockerfile
    container_name: agroguide-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Vector Database: Qdrant (Phase 11)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: agroguide-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python AI Vision Service
  vision-service:
    build:
      context: ./vision-service
      dockerfile: Dockerfile
    container_name: agroguide-vision-service
    restart: always
    ports:
      - "8000:8000"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Node.js Server Backend API Gateway
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agroguide-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - uploads_data:/usr/src/app/uploads
      - backups_data:/usr/src/app/backups
    networks:
      - backend-net
      - frontend-net
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/agroguide
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - VISION_SERVICE_URL=http://vision-service:8000/analyze
      - QDRANT_URL=http://qdrant:6333
      - LLM_PROVIDER=gemini
      - RUN_API=true
      - RUN_SCHEDULERS=false
      - RUN_WORKERS=false
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 3

  # BullMQ Worker Container Task
  bullmq-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agroguide-bullmq-worker
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/usr/src/app/uploads
    networks:
      - backend-net
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/agroguide
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - VISION_SERVICE_URL=http://vision-service:8000/analyze
      - RUN_API=false
      - RUN_SCHEDULERS=false
      - RUN_WORKERS=true

  # Cron Scheduler Container Task
  cron-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agroguide-cron-worker
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/usr/src/app/uploads
      - backups_data:/usr/src/app/backups
    networks:
      - backend-net
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/agroguide
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - VISION_SERVICE_URL=http://vision-service:8000/analyze
      - RUN_API=false
      - RUN_SCHEDULERS=true
      - RUN_WORKERS=false

  # React SPA Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agroguide-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - frontend-net

  # Nginx Gateway Reverse Proxy
  gateway:
    image: nginx:1.25-alpine
    container_name: agroguide-nginx-gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/usr/share/nginx/html/uploads:ro
    depends_on:
      - frontend
      - backend
    networks:
      - frontend-net

volumes:
  mongodb_data:
  redis_data:
  qdrant_data:
  uploads_data:
  backups_data:

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge
